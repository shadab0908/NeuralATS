<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS NEURAL | Logic Engine</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Marked.js for AI Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00c1;
            --dark-bg: #0a0b10;
            --glass-bg: rgba(20, 22, 35, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            background-image:
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1, h4 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .cyber-header { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }

        .form-control-cyber {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(0, 242, 255, 0.3) !important;
            color: var(--neon-blue) !important;
            border-radius: 8px;
        }

        .form-control-cyber:focus {
            box-shadow: 0 0 15px var(--neon-blue);
            border-color: var(--neon-blue) !important;
        }

        .upload-zone {
            border: 2px dashed var(--neon-blue);
            padding: 30px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            background: rgba(0, 242, 255, 0.02);
        }

        .upload-zone:hover {
            background: rgba(0, 242, 255, 0.08);
            box-shadow: inset 0 0 20px var(--neon-blue);
        }

        .btn-cyber {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: bold;
            box-shadow: 0 0 10px var(--neon-blue);
            transition: 0.3s;
            width: 100%;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-cyber:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 40px var(--neon-blue);
        }

        .ai-box {
            border-left: 5px solid var(--neon-pink);
            background: rgba(255, 0, 193, 0.05);
            padding: 25px;
            border-radius: 0 15px 15px 0;
            line-height: 1.6;
        }

        #markdownBody h1, #markdownBody h2, #markdownBody h3 { color: var(--neon-blue); font-size: 1.2rem; margin-top: 15px; }
        #markdownBody ul { padding-left: 20px; }
        #markdownBody li { margin-bottom: 8px; }
        #markdownBody strong { color: var(--neon-blue); }

        .spinner-border { color: var(--neon-pink); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center text-center">
        <div class="col-lg-10">
            <h1 class="display-4 fw-bold cyber-header mb-2">ATS NEURAL SCAN</h1>
            <p class="text-secondary mb-5 fw-light">MATCHING RESUME VECTORS AGAINST JOB PARAMETERS</p>

            <div class="glass-card p-4 p-md-5 mb-5 text-start">
                <form id="uploadForm">
                    <!-- Job Description Input -->
                    <div class="mb-4">
                        <label class="form-label text-info small fw-bold">INPUT: JOB DESCRIPTION (JD)</label>
                        <textarea id="jobDescription" class="form-control form-control-cyber"
                                  rows="6" placeholder="Paste the target job requirements here..." required></textarea>
                    </div>

                    <!-- File Upload Input -->
                    <div class="mb-4">
                        <label class="form-label text-info small fw-bold">INPUT: RESUME DATA (PDF)</label>
                        <div class="upload-zone">
                            <input type="file" id="resumeFile" class="form-control bg-transparent text-white border-0" accept=".pdf" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-cyber">INITIALIZE COMPARISON</button>
                </form>
            </div>

            <!-- Loading State -->
            <div id="loading" class="d-none my-5">
                <div class="spinner-border" style="width: 3.5rem; height: 3.5rem;" role="status"></div>
                <p class="mt-3 text-info fw-bold animate-pulse">SYNCHRONIZING WITH NEURAL NETWORK...</p>
            </div>

            <!-- Results Section -->
            <div id="result" class="d-none text-start glass-card p-4 p-md-5">
                <h4 class="mb-4" style="color: var(--neon-pink);">Scan Results Detected</h4>

                <div id="analysisContent">
                    <!-- Results Rendered Here -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();

        const file = document.getElementById('resumeFile').files[0];
        const jdText = document.getElementById('jobDescription').value;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('jd', jdText);

        document.getElementById('loading').classList.remove('d-none');
        document.getElementById('result').classList.add('d-none');

        try {
            const response = await fetch('/api/resume/analyze', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.status === "success") {
                document.getElementById('analysisContent').innerHTML = `
                    <div class="mb-4 border-bottom border-secondary pb-3">
                        <p class="mb-1 text-secondary text-uppercase small">Source File</p>
                        <p class="fw-bold text-white">${data.fileName}</p>
                    </div>

                    <div class="ai-box">
                        <div id="markdownBody" class="text-light fw-light">
                            ${marked.parse(data.aiFeedback)}
                        </div>
                    </div>
                `;
                document.getElementById('result').classList.remove('d-none');
                // Scroll to result
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            } else {
                alert('SYSTEM ERROR: ' + data.error);
            }
        } catch (err) {
            alert('CRITICAL LINK FAILURE');
            console.error(err);
        } finally {
            document.getElementById('loading').classList.add('d-none');
        }
    };
</script>

</body>
</html>
